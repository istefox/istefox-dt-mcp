# Italian user-facing error messages keyed by ErrorCode.

[error.DT_NOT_RUNNING]
message = "DEVONthink non è in esecuzione."
recovery_hint = "Avvia DEVONthink 4 e riprova."

[error.DT_VERSION_INCOMPATIBLE]
message = "Versione di DEVONthink non supportata."
recovery_hint = "Aggiorna a DEVONthink 4.0 o superiore. Per DT3 usa il connector dvcrn/mcp-server-devonthink."

[error.JXA_TIMEOUT]
message = "L'operazione su DEVONthink è scaduta."
recovery_hint = "Verifica che DEVONthink non sia bloccato. Aumenta jxa_timeout_ms in config se persiste."

[error.JXA_ERROR]
message = "Errore interno del bridge JXA."
recovery_hint = "Riprova. Se persiste, controlla i log su stderr."

[error.JXA_PARSE_ERROR]
message = "Risposta non interpretabile da DEVONthink."
recovery_hint = "Probabile incompatibilità con la versione di DEVONthink installata."

[error.RECORD_NOT_FOUND]
message = "Record non trovato."
recovery_hint = "Verifica l'UUID e che il database che lo contiene sia aperto."

[error.DATABASE_NOT_FOUND]
message = "Database non trovato o non aperto."
recovery_hint = "Apri il database in DEVONthink (File → Open Database). Verifica il nome con list_databases."

[error.PERMISSION_DENIED]
message = "Permesso negato."
recovery_hint = "Lo scope OAuth attuale non consente questa operazione."

[error.RATE_LIMITED]
message = "Troppe richieste concorrenti."
recovery_hint = "Riprova dopo qualche secondo."

[error.VALIDATION_ERROR]
message = "Input non valido."
recovery_hint = "Vedi il dettaglio dell'errore per il campo problematico."

[error.INTERNAL_ERROR]
message = "Errore interno."
recovery_hint = "Controlla i log strutturati su stderr per il dettaglio tecnico."
